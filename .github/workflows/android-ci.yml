name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  lint:
    name: Lint (ktlint + detekt)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate local.properties from secrets
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "HERE_ACCESS_KEY_ID=${{ secrets.HERE_ACCESS_KEY_ID }}"
            echo "HERE_ACCESS_KEY_SECRET=${{ secrets.HERE_ACCESS_KEY_SECRET }}"
            echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}"
            echo "CERTIFICATE_PINS=${{ secrets.CERTIFICATE_PINS }}"
          } > local.properties
      - name: ktlint + detekt
        run: ./gradlew ktlintCheck detekt --console=plain --no-daemon

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate local.properties from secrets
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "HERE_ACCESS_KEY_ID=${{ secrets.HERE_ACCESS_KEY_ID }}"
            echo "HERE_ACCESS_KEY_SECRET=${{ secrets.HERE_ACCESS_KEY_SECRET }}"
            echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}"
            echo "CERTIFICATE_PINS=${{ secrets.CERTIFICATE_PINS }}"
          } > local.properties
      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --console=plain --no-daemon
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/

  snapshot:
    name: Paparazzi snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate local.properties from secrets
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "HERE_ACCESS_KEY_ID=${{ secrets.HERE_ACCESS_KEY_ID }}"
            echo "HERE_ACCESS_KEY_SECRET=${{ secrets.HERE_ACCESS_KEY_SECRET }}"
            echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}"
            echo "CERTIFICATE_PINS=${{ secrets.CERTIFICATE_PINS }}"
          } > local.properties
      - name: Paparazzi verify
        run: ./gradlew :app:verifyPaparazziDebug --console=plain --no-daemon
      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paparazzi-diffs
          path: app/out/failures/

  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate local.properties from secrets
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "HERE_ACCESS_KEY_ID=${{ secrets.HERE_ACCESS_KEY_ID }}"
            echo "HERE_ACCESS_KEY_SECRET=${{ secrets.HERE_ACCESS_KEY_SECRET }}"
            echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}"
            echo "CERTIFICATE_PINS=${{ secrets.CERTIFICATE_PINS }}"
          } > local.properties
      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --console=plain --no-daemon
